<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Contact - Math Academy by Mrs Garg</title>
    <link rel="stylesheet" href="css/styles.css">
  </head>
  <body>
    <header class="site-header">
      <div class="container">
        <a class="brand" href="index.html">Math Academy by Mrs Garg</a>
        <button id="nav-toggle" class="nav-toggle">☰</button>
        <nav id="main-nav" class="main-nav">
          <a href="index.html">Home</a>
          <a href="about.html">About</a>
          <a href="tas.html">TAs</a>
          <a href="all-reviews.html">Reviews</a>
          <a href="contact.html">Contact</a>
        </nav>
      </div>
    </header>

    <main class="container">
      <h1>Contact</h1>
      <p>Send a message</p>
      <form
        id="contact-form"
        class="contact-form"
        action="https://formsubmit.co/kaizoku4740@gmail.com"
        method="POST"
        data-form-provider="formsubmit"
      >
        <input type="hidden" name="_subject" value="New Math Academy contact form message" />
        <input type="hidden" name="_template" value="table" />
        <input type="hidden" name="_captcha" value="false" />
        <label>
          Name
          <input type="text" name="name" required />
        </label>
        <label>
          Email
          <input type="email" name="email" required />
        </label>
        <label>
          Message
          <textarea name="message" rows="5" required></textarea>
        </label>
        <div class="actions">
          <button type="submit" class="btn">Send</button>
        </div>
        <p id="form-status" class="form-status" aria-live="polite">Replace your-email@example.com in the form before going live.</p>
      </form>
    </main>

    <footer class="site-footer">
      <div class="container">
        <small>&copy; <span id="year"></span> MySite</small>
      </div>
    </footer>

    <script src="js/main.js"></script>
  </body>
</html>
