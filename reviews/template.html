<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Reviews — MathByMsGarg</title>
    <meta name="description" content="Reviews and testimonials.">
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  </head>
  <body>
    <header class="site-header">
      <div class="container">
        <a class="brand" href="../index.html">MathByMsGarg</a>
        <button id="nav-toggle" class="nav-toggle">☰</button>
        <nav id="main-nav" class="main-nav">
          <a href="../index.html">Home</a>
          <a href="../about.html">About</a>
          <a href="../tas.html">TAs</a>
          <a href="../contact.html">Contact</a>
        </nav>
      </div>
    </header>

    <main class="container">
      <h1 id="page-title">Reviews</h1>
      <section>
        <form id="review-form" class="contact-form">
          <label>Name<input name="name" required></label>
          <label>Rating
            <select name="rating">
              <option value="5">5 — Excellent</option>
              <option value="4">4 — Good</option>
              <option value="3">3 — Okay</option>
              <option value="2">2 — Fair</option>
              <option value="1">1 — Poor</option>
            </select>
          </label>
          <label>Review<textarea name="text" rows="4" required></textarea></label>
          <div class="actions"><button class="btn" type="submit">Submit review</button></div>
        </form>
      </section>

      <section style="margin-top:1rem">
        <div style="display:flex;align-items:center;gap:1rem;justify-content:space-between;">
          <div>
            <h2 style="margin:.2rem 0">All reviews</h2>
            <div id="average-summary" style="color:var(--muted);font-size:.95rem">No reviews yet</div>
          </div>
          <div>
            <label style="color:var(--muted);font-size:.95rem">Sort: <select id="sort-select"><option value="newest">Newest</option><option value="highest">Highest</option></select></label>
          </div>
        </div>
        <div id="reviews-list"></div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container">
        <small>&copy; <span id="year"></span> MathByMsGarg</small>
      </div>
    </footer>

    <script src="../js/main.js"></script>
    <script>
      // Extract TA ID from URL (e.g., msgarg.html -> msgarg)
      const taId = window.location.pathname.split('/').pop().replace('.html', '');
      const storageKey = `reviews-${taId}`;

      const listEl = document.getElementById('reviews-list');
      const form = document.getElementById('review-form');
      const avgEl = document.getElementById('average-summary');
      const pageTitle = document.getElementById('page-title');

      // Load TA name from tas.json
      (async function loadTAInfo(){
        try{
          const resp = await fetch('../tas.json');
          const tas = await resp.json();
          const ta = tas.find(t => t.id === taId);
          if(ta) pageTitle.textContent = `Reviews for ${ta.name}`;
        }catch(e){ console.warn('could not load TA info', e) }
      })();

      function computeSummary(reviews){
        if(!reviews || reviews.length===0) return {avg:0,count:0}
        const sum = reviews.reduce((s,r)=>s + (Number(r.rating)||0),0);
        return { avg: sum / reviews.length, count: reviews.length }
      }

      function render(){
        let reviews = JSON.parse(localStorage.getItem(storageKey) || '[]');
        const sort = document.getElementById('sort-select')?.value || 'newest';
        if(sort === 'highest') reviews = reviews.slice().sort((a,b)=>b.rating - a.rating);
        else reviews = reviews.slice().sort((a,b)=>b.ts - a.ts);

        const summary = computeSummary(reviews);
        if(summary.count===0){ avgEl.textContent = 'No reviews yet — be the first!'; }
        else { avgEl.innerHTML = `<strong>${summary.avg.toFixed(1)}</strong> average — ${summary.count} review${summary.count>1?'s':''}` }

        if(reviews.length === 0){ listEl.innerHTML = '<p>No reviews yet — be the first!</p>'; return }
        listEl.innerHTML = reviews.map((r,i)=>{
          const name = appHelpers.escapeHtml(r.name);
          const text = appHelpers.escapeHtml(r.text);
          const date = appHelpers.formatDate(r.ts);
          return `<div class="card reveal" style="animation-delay:${i*40}ms"><div style="display:flex;justify-content:space-between;align-items:center"><div><strong>${name}</strong><br><small style="color:var(--muted)">${date}</small></div><button class="delete-btn" data-id="${r.ts}" style="background:#dc2626;color:white;border:0;padding:.3rem .5rem;border-radius:6px;font-size:.8rem;cursor:pointer">Delete</button></div><div style="margin:.5rem 0">${'★'.repeat(r.rating)}</div><p style="margin:0">${text}</p></div>`
        }).join('');

        // attach delete listeners
        document.querySelectorAll('.delete-btn').forEach(btn => {
          btn.addEventListener('click', function(e){
            e.preventDefault();
            const id = this.getAttribute('data-id');
            const pwd = prompt('Enter password to delete this review:');
            if(pwd === 'delete123'){
              let reviews = JSON.parse(localStorage.getItem(storageKey) || '[]');
              reviews = reviews.filter(r => r.ts !== Number(id));
              localStorage.setItem(storageKey, JSON.stringify(reviews));
              render();
            } else if(pwd !== null){
              alert('Wrong password.');
            }
          });
        });
      }

      form.addEventListener('submit', function(e){
        e.preventDefault();
        const data = new FormData(form);
        const review = { name: data.get('name'), rating: Number(data.get('rating')||5), text: data.get('text'), ts: Date.now() };
        let reviews = JSON.parse(localStorage.getItem(storageKey) || '[]');
        reviews.unshift(review);
        localStorage.setItem(storageKey, JSON.stringify(reviews));
        form.reset();
        render();
      });

      document.getElementById('sort-select')?.addEventListener('change', render);
      render();
    </script>
  </body>
</html>
